version: '3.9'

services:
  amico_db:
    container_name: amico_db
    image: postgres:17.5
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - trovaunamico_pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  trovaunamico_app:
    container_name: trovaunamico_app
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://amico_db:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      GOOGLE_CLIENT_ID:  ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SPRING_SENDGRID_API_KEY: ${SPRING_SENDGRID_API_KEY}
      SPRING_SENDGRID_SENDER_EMAIL: "noreply.trovaunamico@gmail.com"
    depends_on:
      amico_db:
        condition: service_healthy

volumes:
  trovaunamico_pgdata:
